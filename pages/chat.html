<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colo — Chat com a MIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
  .chat-body { padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; height: calc(100vh - 200px); }
  .message { padding: 10px 14px; border-radius: 16px; max-width: 75%; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; line-height: 1.4; }
  .user-msg { background-color: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .mia-msg { background-color: #f1f1f4; color: #1c1c1e; align-self: flex-start; border-bottom-left-radius: 4px; }
  .typing-indicator { font-style: italic; color: #8e8e93; font-size: 12px; align-self: flex-start; margin-left: 5px; }
</style>
</head>
<body>

<div class="device">
  <div class="chat-screen">
    <div class="chat-header">
      <div class="mia-avatar">M</div>
      <div>
        <h2>MIA</h2>
        <p><span class="status-dot"></span>sempre por aqui pra te ouvir</p>
      </div>
    </div>

    <div class="chat-body" id="chat-body"></div>

    <div class="chat-input-bar">
      <div class="search-bar">
        <button class="icon-btn" id="chat-mic" aria-label="Falar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </button>
        <input id="chat-input" type="text" placeholder="Escreva para a MIA…" />
        <button class="send-btn" id="chat-send" aria-label="Enviar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <nav class="tabbar">
    <a class="tab-btn" href="index.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Início
    </a>
    <a class="tab-btn" href="agenda.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </a>
    <a class="tab-btn active" href="chat.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Chat IA
    </a>
  </nav>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const chatBody = document.getElementById("chat-body");
    const chatInput = document.getElementById("chat-input");
    const chatSend = document.getElementById("chat-send");

    // Banco de respostas da MIA baseado em palavras-chave
    const respostasMia = {
      "oi": "Olá! Que bom te ver por aqui. Como você está se sentindo hoje?",
      "olá": "Oi! Sempre um prazer conversar com você. Do que você precisa hoje?",
      "bom dia": "Bom dia! Espero que seu dia seja leve. Como posso te ajudar?",
      "boa tarde": "Boa tarde! Como está sendo o seu dia até agora?",
      "boa noite": "Boa noite. Como foi o seu dia? Estou aqui para ouvir.",
      "triste": "Sinto muito que esteja se sentindo assim. Quer desabafar sobre o que aconteceu? Estou te ouvindo.",
      "ansioso": "Respire fundo... vai dar tudo certo. Quer que eu te ajude a organizar as tarefas do dia para aliviar a mente?",
      "agenda": "Você pode checar seus compromissos clicando na aba 'Agenda' ali embaixo!",
      "obrigado": "Imagina! Estou aqui para isso. Se precisar de mais algo, só chamar. 🤍",
      "padrão": "Entendi. Me conta mais sobre isso? Estou aqui para te apoiar no que precisar."
    };

    // Mensagem de boas-vindas da MIA ao carregar a página
    setTimeout(() => {
      adicionarMensagem("Oi! Eu sou a MIA. Como está seu dia? Pode desabafar ou me pedir ajuda com a rotina.", "mia");
    }, 600);

    // Função para renderizar as mensagens na tela
    function adicionarMensagem(texto, remetente) {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", remetente === "user" ? "user-msg" : "mia-msg");
      msgDiv.innerText = texto;
      chatBody.appendChild(msgDiv);
      chatBody.scrollTop = chatBody.scrollHeight; // Rola o chat para baixo
    }

    // Função que processa a resposta da MIA
    function lógicaRespostaMia(mensagemUsuario) {
      const textoLimpo = mensagemUsuario.toLowerCase().trim();
      let resposta = respostasMia["padrão"];

      // Procura por palavras-chave na frase do usuário
      for (let chave in respostasMia) {
        if (textoLimpo.includes(chave) && chave !== "padrão") {
          resposta = respostasMia[chave];
          break;
        }
      }

      // Cria o efeito de "MIA está digitando..."
      const indicadorDigitando = document.createElement("div");
      indicadorDigitando.classList.add("typing-indicator");
      indicadorDigitando.innerText = "MIA está digitando...";
      chatBody.appendChild(indicadorDigitando);
      chatBody.scrollTop = chatBody.scrollHeight;

      setTimeout(() => {
        indicadorDigitando.remove();
        adicionarMensagem(resposta, "mia");
      }, 1200); // 1.2 segundos de delay para parecer real
    }

    // Evento de enviar mensagem ao clicar no botão
    chatSend.addEventListener("click", () => {
      const texto = chatInput.value.trim();
      if (texto !== "") {
        adicionarMensagem(texto, "user");
        chatInput.value = ""; // Limpa o input
        lógicaRespostaMia(texto);
      }
    });

    // Evento de enviar ao apertar a tecla "Enter"
    chatInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        chatSend.click();
      }
    });
  });
</script>

</body>
</html>
